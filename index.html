<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salvatore · Panel de Aprobación</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');
:root {
  --bg:#0d0d14; --surface:#13131e; --border:#1e1e30;
  --red:#D41B1B; --red-dark:#a01414; --gold:#F5C500;
  --text:#f0f0f0; --muted:#55556a;
  --success:#22c55e; --danger:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}

#login-screen{width:100%;max-width:340px;padding:2rem;display:flex;flex-direction:column;align-items:center;}
.logo-wrap{margin-bottom:1.5rem;text-align:center;}
.logo-wrap img{width:160px;height:auto;filter:drop-shadow(0 4px 16px rgba(213,27,27,0.4));}
.login-sub{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:1.75rem;}
.field{width:100%;margin-bottom:.85rem;}
.field label{display:block;font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.35rem;}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;padding:.65rem .9rem;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--gold);}
.btn-login{width:100%;background:var(--red);color:#fff;border:none;border-bottom:3px solid var(--red-dark);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;padding:.75rem;cursor:pointer;margin-top:.3rem;transition:background .15s;}
.btn-login:hover{background:var(--red-dark);}
.err-msg{color:var(--danger);font-size:.7rem;margin-top:.6rem;display:none;}

#dashboard{display:none;width:100%;max-width:820px;padding:1.75rem 2rem;min-height:100vh;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.header img{height:50px;width:auto;filter:drop-shadow(0 2px 8px rgba(213,27,27,0.3));}
.header-right{display:flex;align-items:center;gap:1rem;}
.live{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--success);border:1px solid rgba(34,197,94,.3);padding:.22rem .6rem;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-out{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:none;border:1px solid var(--border);padding:.22rem .6rem;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;}
.btn-out:hover{border-color:var(--danger);color:var(--danger);}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:1.75rem;}
.stat{background:var(--surface);padding:1rem 1.3rem;}
.sn{font-family:'Bebas Neue',sans-serif;font-size:2.3rem;line-height:1;}
.sn.w{color:var(--gold);}
.sn.g{color:var(--success);}
.sl{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-top:.15rem;}

.ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.slabel{font-size:.62rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.btn-ref{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:none;border:1px solid var(--border);padding:.22rem .6rem;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;}
.btn-ref:hover{border-color:var(--gold);color:var(--gold);}

#lista{display:flex;flex-direction:column;gap:1px;}
.card{background:var(--surface);border-left:2px solid transparent;padding:1rem 1.3rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;transition:border-color .2s;}
.card:hover{border-left-color:var(--gold);}
.card.done{border-left-color:var(--success);opacity:.45;}
.cn{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:1px;margin-bottom:.25rem;}
.cm{display:flex;gap:1rem;font-size:.68rem;color:var(--muted);flex-wrap:wrap;}
.cq{color:var(--gold);font-weight:500;}
.ca{display:flex;gap:.5rem;align-items:center;flex-shrink:0;}
.bver{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:none;border:1px solid var(--border);padding:.4rem .7rem;cursor:pointer;font-family:'DM Mono',monospace;text-decoration:none;transition:all .2s;}
.bver:hover{border-color:var(--text);color:var(--text);}
.brec{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#ef4444;background:none;border:1px solid rgba(239,68,68,.4);padding:.4rem .7rem;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;white-space:nowrap;}
.brec:hover{background:rgba(239,68,68,.1);}
.brec:disabled{opacity:.5;cursor:not-allowed;}
.tag-estado{font-size:.62rem;text-transform:uppercase;letter-spacing:1.5px;padding:.28rem .6rem;border:1px solid;border-radius:2px;}
.leyenda{display:flex;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.ley-item{display:flex;align-items:center;gap:6px;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.ley-dot{width:10px;height:10px;border-radius:50%;}
.premios-section{margin-bottom:1rem;}
.premios-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.premios-title{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.btn-toggle-premios{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:none;border:1px solid var(--border);padding:.25rem .65rem;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;}
.btn-toggle-premios:hover{border-color:var(--accent, var(--gold));color:var(--gold);}
.premios-grid{display:none;flex-direction:column;gap:8px;}
.premios-grid.open{display:flex;}
.premio-row{display:grid;grid-template-columns:110px 1fr auto;gap:8px;align-items:center;}
.premio-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.premio-input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;padding:.4rem .7rem;outline:none;transition:border-color .2s;width:100%;}
.premio-input:focus{border-color:var(--gold);}
.btn-save-premio{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:1.5px;color:#0a0a0a;background:var(--gold);border:none;padding:.4rem .8rem;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-save-premio:hover{background:var(--gold-dark, #c9a000);}
.btn-save-premio:disabled{background:var(--muted);cursor:not-allowed;}
.emergencias{background:var(--surface);border:1px solid var(--border);padding:.85rem 1.25rem;margin-bottom:1rem;border-left:2px solid var(--warning);}
.emg-title{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--warning);margin-bottom:.6rem;}
.emg-btns{display:flex;gap:.75rem;flex-wrap:wrap;}
.btn-emg{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text);background:var(--bg);border:1px solid var(--border);padding:.5rem 1rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:1px;}
.btn-emg:hover{border-color:var(--warning);color:var(--warning);}
.btn-emg:disabled{opacity:.5;cursor:not-allowed;}
.emg-icon{font-size:14px;}
.tabs{display:flex;gap:1px;background:var(--border);margin-bottom:1rem;}
.tab{flex:1;padding:.6rem .5rem;font-family:'DM Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;background:var(--surface);color:var(--muted);border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active.pend{background:var(--surface);color:var(--gold);border-bottom:2px solid var(--gold);}
.tab.active.apro{background:var(--surface);color:var(--success);border-bottom:2px solid var(--success);}
.tab.active.rech{background:var(--surface);color:#ef4444;border-bottom:2px solid #ef4444;}
.tab-badge{font-size:.6rem;padding:1px 6px;border-radius:10px;font-weight:500;}
.tab.active.pend .tab-badge{background:rgba(245,197,0,.15);color:var(--gold);}
.tab.active.apro .tab-badge{background:rgba(34,197,94,.15);color:var(--success);}
.tab.active.rech .tab-badge{background:rgba(239,68,68,.15);color:#ef4444;}
.tab:not(.active) .tab-badge{background:var(--border);color:var(--muted);}
.bapr{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;color:#fff;background:var(--red);border:none;border-bottom:2px solid var(--red-dark);padding:.4rem 1rem;cursor:pointer;transition:background .15s;white-space:nowrap;}
.bapr:hover{background:var(--red-dark);}
.bapr:disabled{background:var(--muted);border-bottom-color:#333;cursor:not-allowed;}
.tok{font-size:.62rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--success);border:1px solid rgba(34,197,94,.4);padding:.28rem .6rem;}
.empty{text-align:center;padding:3.5rem 1rem;color:var(--muted);}
.ei{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--border);line-height:1;}
.empty p{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;margin-top:.4rem;}

#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--success);color:#0a2010;font-size:.75rem;font-family:'DM Mono',monospace;padding:.6rem 1rem;transform:translateY(60px);opacity:0;transition:all .25s;z-index:100;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.err{background:var(--danger);color:#fff;}

@media(max-width:580px){
  #dashboard{padding:1.25rem;}
  .stats{grid-template-columns:1fr;}
  .card{flex-direction:column;align-items:flex-start;}
  .ca{align-self:flex-end;}
}
</style>

<script>
const CFG = {
  WEBHOOK: "https://script.google.com/macros/s/AKfycbxC-rBhCnqvu0jEOhaQGvb6q532uHuQ0l6wG2GpULj84hRymZBrMnfmAkfPKm1cAHbV/exec",
  USUARIOS: [{ u: "admin", p: "salvatore2024" }],
  AUTO_REFRESH: 30
};
let tmr = null;

function login() {
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  if (CFG.USUARIOS.find(x => x.u === u && x.p === p)) {
    sessionStorage.setItem('sv','1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    cargar();
    if (CFG.AUTO_REFRESH) tmr = setInterval(cargar, CFG.AUTO_REFRESH * 1000);
  } else { document.getElementById('err').style.display = 'block'; }
}
function logout() {
  sessionStorage.removeItem('sv'); clearInterval(tmr);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
document.getElementById('p').addEventListener('keydown', e => { if (e.key==='Enter') login(); });

async function cargar() {
  try {
    const r = await fetch(CFG.WEBHOOK + '?accion=listarComprobantes');
    const d = await r.json();
    if (d.comprobantes) render(d.comprobantes);
  } catch(e) {
    document.getElementById('lista').innerHTML = '<div class="empty"><div class="ei">!</div><p>Sin conexión</p></div>';
  }
}

let _todosData = [];
let _tabActiva = 'Pendiente';

function cambiarTab(estado) {
  _tabActiva = estado;
  // Actualizar estilos de pestañas
  ['pend','apro','rech'].forEach(t => document.getElementById('tab-'+t).classList.remove('active'));
  const mapa = {'Pendiente':'pend','Aprobado':'apro','Rechazado':'rech'};
  const labels = {'Pendiente':'Pendientes de hoy','Aprobado':'Aprobados de hoy','Rechazado':'Rechazados de hoy'};
  document.getElementById('tab-'+mapa[estado]).classList.add('active');
  document.getElementById('tab-label').textContent = labels[estado];
  renderLista(_todosData);
}

function render(data) {
  _todosData = data;
  const pend  = data.filter(c => c.estado === 'Pendiente');
  const apr   = data.filter(c => c.estado === 'Aprobado');
  const rec   = data.filter(c => c.estado === 'Rechazado');
  const carts = apr.reduce((s,c) => s + (parseInt(c.cantidad)||1), 0);

  // Stats
  document.getElementById('sp').textContent = pend.length;
  document.getElementById('sa').textContent = apr.length;
  document.getElementById('sc').textContent = carts;

  // Badges en pestañas
  document.getElementById('badge-pend').textContent = pend.length;
  document.getElementById('badge-apro').textContent = apr.length;
  document.getElementById('badge-rech').textContent = rec.length;

  renderLista(data);
}

function renderLista(data) {
  const filtrado = data.filter(c => c.estado === _tabActiva);
  const lista = document.getElementById('lista');
  const borde = _tabActiva === 'Aprobado' ? 'var(--success)' : _tabActiva === 'Rechazado' ? '#ef4444' : 'var(--gold)';
  const etiquetas = {'Pendiente':'','Aprobado':'✓ Aprobado','Rechazado':'✗ Rechazado'};

  if (!filtrado.length) {
    const msgs = {'Pendiente':'Todo al día — sin pendientes','Aprobado':'Sin aprobados aún','Rechazado':'Sin rechazados'};
    lista.innerHTML = `<div class="empty"><div class="ei">OK</div><p>${msgs[_tabActiva]}</p></div>`;
    return;
  }

  lista.innerHTML = filtrado.map(c => {
    const esPend = c.estado === 'Pendiente';
    const acciones = esPend
      ? `<a class="bver" href="${c.urlComprobante}" target="_blank">Ver</a>
         <button class="brec" id="r-${c.id}" onclick="rechazar('${c.cedula}','${c.id}','${c.nombre}')">Rechazar</button>
         <button class="bapr" id="b-${c.id}" onclick="aprobar('${c.cedula}','${c.id}','${c.nombre}')">Aprobar</button>`
      : `<a class="bver" href="${c.urlComprobante}" target="_blank">Ver</a>
         <span class="tag-estado" style="border-color:${borde};color:${borde}">${etiquetas[c.estado]}</span>`;
    return `<div class="card" id="c-${c.id}" style="border-left:2px solid ${borde}">
      <div>
        <div class="cn">${c.nombre||'Sin nombre'}</div>
        <div class="cm">
          <span>CI ${c.cedula}</span>
          <span class="cq">${c.cantidad||1} cartón${(c.cantidad>1)?'es':''}</span>
          <span>${fh(c.fecha)}</span>
          <span>${c.telefono||''}</span>
        </div>
      </div>
      <div class="ca">${acciones}</div>
    </div>`;
  }).join('');
}

async function aprobar(cedula, id, nombre) {
  const btn = document.getElementById('b-'+id);
  btn.disabled = true; btn.textContent = '...';
  try {
    // Usamos GET para evitar bloqueo CORS en POST desde GitHub Pages
    const url = CFG.WEBHOOK + '?accion=aprobarComprobante&cedula=' + encodeURIComponent(cedula);
    const r = await fetch(url);
    const d = await r.json();
    if (d.exito) {
      const card = document.getElementById('c-'+id);
      card.classList.add('done');
      card.querySelector('.ca').innerHTML = '<span class="tok">✓ Aprobado</span>';
      toast('Cartón enviado a '+nombre);
      setTimeout(cargar, 1800);
    } else { btn.disabled=false; btn.textContent='Aprobar'; toast(d.error||'Error',true); }
  } catch(e) { btn.disabled=false; btn.textContent='Aprobar'; toast('Error de conexión',true); }
}

async function rechazar(cedula, id, nombre) {
  const btn = document.getElementById('r-'+id);
  btn.disabled = true; btn.textContent = '...';
  try {
    const url = CFG.WEBHOOK + '?accion=rechazarComprobante&cedula=' + encodeURIComponent(cedula);
    const r = await fetch(url);
    const d = await r.json();
    if (d.exito) {
      const card = document.getElementById('c-'+id);
      card.style.opacity = '0.4';
      card.querySelector('.ca').innerHTML = '<span style="font-size:.62rem;color:#ef4444;border:1px solid rgba(239,68,68,.4);padding:.28rem .6rem;">✗ Rechazado</span>';
      toast('Comprobante rechazado — se avisó a ' + nombre, true);
      setTimeout(cargar, 1800);
    } else { btn.disabled=false; btn.textContent='Rechazar'; toast(d.error||'Error',true); }
  } catch(e) { btn.disabled=false; btn.textContent='Rechazar'; toast('Error de conexión',true); }
}

async function togglePremios() {
  const grid = document.getElementById('premios-grid');
  const isOpen = grid.classList.contains('open');
  if (!isOpen) {
    // Cargar premios al abrir
    try {
      const r = await fetch(CFG.WEBHOOK + '?accion=getPremios');
      const d = await r.json();
      if (d.exito && d.premios) {
        Object.keys(d.premios).forEach(k => {
          const input = document.getElementById('p-' + k);
          if (input) input.value = d.premios[k] || '';
        });
      }
    } catch(e) { toast('Error al cargar premios', true); return; }
    grid.classList.add('open');
  } else {
    grid.classList.remove('open');
  }
}

async function guardarPremio(clave) {
  const input = document.getElementById('p-' + clave);
  const btn = input.nextElementSibling;
  const valor = input.value.trim();
  if (!valor) { toast('El premio no puede estar vacío', true); return; }
  btn.disabled = true; btn.textContent = '...';
  try {
    const url = CFG.WEBHOOK + '?accion=setPremio&clave=' + encodeURIComponent(clave) + '&valor=' + encodeURIComponent(valor);
    const r = await fetch(url);
    const d = await r.json();
    if (d.exito) {
      toast('Premio guardado ✅');
    } else {
      toast(d.error || 'Error al guardar', true);
    }
  } catch(e) {
    toast('Error de conexión', true);
  } finally {
    btn.disabled = false; btn.textContent = 'Guardar';
  }
}

async function emergencia(accion) {
  const labels = {
    'cargarManual': 'Cargando cartones del día...',
    'agregarStock': 'Agregando stock...'
  };
  const btnId = accion === 'cargarManual' ? 'btn-cargar' : 'btn-stock';
  const btn = document.getElementById(btnId);
  const textoOriginal = btn.querySelector('span:last-child').textContent;
  btn.disabled = true;
  btn.querySelector('span:last-child').textContent = labels[accion];

  try {
    const r = await fetch(CFG.WEBHOOK + '?accion=' + accion);
    const d = await r.json();
    if (d.exito) {
      toast(d.mensaje || 'Operación exitosa ✅');
      setTimeout(cargar, 1500);
    } else {
      toast(d.error || 'Error en la operación', true);
    }
  } catch(e) {
    toast('Error de conexión', true);
  } finally {
    btn.disabled = false;
    btn.querySelector('span:last-child').textContent = textoOriginal;
  }
}

function fh(f) {
  if (!f) return '—';
  const d = new Date(f);
  return d.toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'});
}
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show'+(err?' err':'');
  setTimeout(()=>t.className='', 3000);
}

if (sessionStorage.getItem('sv')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  cargar();
  if (CFG.AUTO_REFRESH) tmr = setInterval(cargar, CFG.AUTO_REFRESH * 1000);
}
</script>
